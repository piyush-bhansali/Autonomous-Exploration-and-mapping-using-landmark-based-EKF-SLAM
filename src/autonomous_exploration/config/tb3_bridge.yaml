- ros_topic_name: "/{robot_name}/joint_states"
  gz_topic_name: "/world/{world_name}/model/{robot_name}/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
  qos:
    reliability: best_effort
    durability: volatile
    history: keep_last
    depth: 10

- ros_topic_name: "/{robot_name}/odom"
  gz_topic_name: "/model/{robot_name}/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS
  qos:
    reliability: best_effort
    durability: volatile
    history: keep_last
    depth: 10

# TF bridge for odom -> base_footprint transform from DiffDrive plugin
# The DiffDrive plugin publishes TF with namespaced frame names (tb3_1/odom -> tb3_1/base_footprint)
# which connects properly with the robot model via robot_state_publisher.
# Full TF chain: map -> tb3_1/odom (EKF) -> tb3_1/base_footprint (DiffDrive) -> tb3_1/base_link (robot_state_publisher)
- ros_topic_name: "/tf"
  gz_topic_name: "/model/{robot_name}/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
  qos:
    reliability: reliable
    durability: volatile
    history: keep_last
    depth: 100

- ros_topic_name: "/{robot_name}/imu"
  gz_topic_name: "/world/{world_name}/model/{robot_name}/link/imu_link/sensor/tb3_imu/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS
  qos:
    reliability: best_effort
    durability: volatile
    history: keep_last
