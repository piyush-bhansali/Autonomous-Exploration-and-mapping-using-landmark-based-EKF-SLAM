- ros_topic_name: "/{robot_name}/joint_states"
  gz_topic_name: "/world/{world_name}/model/{robot_name}/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

- ros_topic_name: "/{robot_name}/odom"
  gz_topic_name: "/model/{robot_name}/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# TF bridge DISABLED - Causes conflicts with EKF-based TF publishing
# The DiffDrive plugin publishes TF with non-namespaced frame names (odom -> base_footprint)
# which creates an orphaned frame that doesn't connect to the robot model.
# Our EKF node publishes properly namespaced TF (odom -> tb3_1/base_footprint) instead.
# Keeping this commented out ensures:
#   - Single authority for robot localization (EKF with sensor fusion)
#   - Proper multi-robot namespace support
#   - No TF conflicts or orphaned frames
# - ros_topic_name: "/tf"
#   gz_topic_name: "/model/{robot_name}/tf"
#   ros_type_name: "tf2_msgs/msg/TFMessage"
#   gz_type_name: "gz.msgs.Pose_V"
#   direction: GZ_TO_ROS

- ros_topic_name: "/{robot_name}/imu"
  gz_topic_name: "/world/{world_name}/model/{robot_name}/link/imu_link/sensor/tb3_imu/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/{robot_name}/scan"
  gz_topic_name: "/world/{world_name}/model/{robot_name}/link/base_scan/sensor/hls_lfcd_lds/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
  qos:
    reliability: best_effort
    durability: volatile
    history: keep_last
    depth: 10

- ros_topic_name: "/{robot_name}/cmd_vel"
  gz_topic_name: "/model/{robot_name}/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/{robot_name}/ground_truth_pose"
  gz_topic_name: "/model/{robot_name}/pose"
  ros_type_name: "geometry_msgs/msg/PoseStamped"
  gz_type_name: "gz.msgs.Pose"
  direction: GZ_TO_ROS